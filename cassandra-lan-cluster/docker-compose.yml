version: "3.9"

services:
  cassandra1:
    build:
      context: ./cassandra-ssh
    container_name: cassandra1
    hostname: cassandra1
    networks:
      cassandra_lan:
        ipv4_address: ${CASS1_IP}
    environment:
      CASSANDRA_CLUSTER_NAME: "lan-cassandra"
      CASSANDRA_SEEDS: "${CASS1_IP}"
      CASSANDRA_LISTEN_ADDRESS: "${CASS1_IP}"
      CASSANDRA_BROADCAST_ADDRESS: "${CASS1_IP}"
      CASSANDRA_RPC_ADDRESS: "0.0.0.0"
      CASSANDRA_BROADCAST_RPC_ADDRESS: "${CASS1_IP}"
      CASSANDRA_NUM_TOKENS: "256"
      CASSANDRA_ENDPOINT_SNITCH: "GossipingPropertyFileSnitch"
    volumes:
      - cassandra1_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES' 127.0.0.1 9042 >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 30
      start_period: 120s
    restart: unless-stopped

  cassandra2:
    image: cassandra:4.1.5
    container_name: cassandra2
    hostname: cassandra2
    depends_on:
      cassandra1:
        condition: service_healthy
    networks:
      cassandra_lan:
        ipv4_address: ${CASS2_IP}
    environment:
      CASSANDRA_CLUSTER_NAME: "lan-cassandra"
      CASSANDRA_SEEDS: "${CASS1_IP}"
      CASSANDRA_LISTEN_ADDRESS: "${CASS2_IP}"
      CASSANDRA_BROADCAST_ADDRESS: "${CASS2_IP}"
      CASSANDRA_RPC_ADDRESS: "0.0.0.0"
      CASSANDRA_BROADCAST_RPC_ADDRESS: "${CASS2_IP}"
      CASSANDRA_NUM_TOKENS: "256"
      CASSANDRA_ENDPOINT_SNITCH: "GossipingPropertyFileSnitch"
    volumes:
      - cassandra2_data:/var/lib/cassandra
    restart: unless-stopped

  cassandra3:
    image: cassandra:4.1.5
    container_name: cassandra3
    hostname: cassandra3
    depends_on:
      cassandra1:
        condition: service_healthy
    networks:
      cassandra_lan:
        ipv4_address: ${CASS3_IP}
    environment:
      CASSANDRA_CLUSTER_NAME: "lan-cassandra"
      CASSANDRA_SEEDS: "${CASS1_IP}"
      CASSANDRA_LISTEN_ADDRESS: "${CASS3_IP}"
      CASSANDRA_BROADCAST_ADDRESS: "${CASS3_IP}"
      CASSANDRA_RPC_ADDRESS: "0.0.0.0"
      CASSANDRA_BROADCAST_RPC_ADDRESS: "${CASS3_IP}"
      CASSANDRA_NUM_TOKENS: "256"
      CASSANDRA_ENDPOINT_SNITCH: "GossipingPropertyFileSnitch"
    volumes:
      - cassandra3_data:/var/lib/cassandra
    restart: unless-stopped

networks:
  cassandra_lan:
    driver: macvlan
    driver_opts:
      parent: ${PARENT_IF}
    ipam:
      config:
        - subnet: ${LAN_SUBNET}
          gateway: ${LAN_GATEWAY}

volumes:
  cassandra1_data:
  cassandra2_data:
  cassandra3_data:
